server.port=8084
spring.datasource.url=jdbc:mysql://odoru-db-stats:3306/odoru_stats_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.rabbitmq.host=odoru-rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

eureka.client.serviceUrl.defaultZone=http://odoru-annuaire:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
zipkin.tracing.endpoint=http://odoru-zipkin:9411/api/v2/spans
